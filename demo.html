<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title> 
</head>
<body>
    <h1>Registration Form</h1>
    <form action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>

        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm password" required><br><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" placeholder="Enter age" required><br><br>

        <label for="gender">Gender:</label>
        <select id="gender" name="gender" required>
            <option value="">Select gender</option>
            <option value=" male">Male</option>
            <option value="female">Female</option>  
            <option value="other">Other</option>
        </select><br><br>       

        <label for="country">Country:</label>
        <select id="country" name="country" required>
            <option value="">Select country</option>
            <option value="usa">USA</option>
            <option value="canada">Canada</option>  
            <option value="uk">UK</option>
            <option value="australia">Australia</option>
            <option value="india">India</option>
        </select><br><br>

        <label for="DOB">Date of Birth:</label>
        <input type="date" id="DOB" name="DOB" required><br><br>

        <video width="320" height="240" controls>
            <source src="sample_video.mp4" type="video/mp4">
            Your browser does not support the video tag.

        <input type="submit" value="Register">
    </form>
    
    
</body>
</html>
