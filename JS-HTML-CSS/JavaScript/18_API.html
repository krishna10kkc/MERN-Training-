        //     li.innerHTML=`

        //         <h3>name : ${user.username}<h3>
        //     `
    })}
    )   
    .catch((error)=>console.log(error))
    
    }
    </script>
</head>
<body>
    <button onclick="fetchData()">Show Data</button>
    <ol id="list"></ol>
    
</body>
</html>
